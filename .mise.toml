[tasks.hugo]
description = "Run hugo to get a preview of the site"
run = """
hugo server --buildDrafts --navigateToChanged
"""


[tasks.build]
description = "Build everything: Hugo site, Gemini conversion, Rust server (native)"
run = """
#!/usr/bin/env bash
set -e

TARGET="${1:-}"

# Check if hugo server is running (interferes with builds)
if pgrep -f "hugo server" > /dev/null; then
  echo "ERROR: Hugo development server is running. Stop it first:"
  echo "  pkill -f 'hugo server'"
  exit 1
fi

# Clean public directory
if [ -d "public" ]; then
  echo "Cleaning public/"
  rm -rf public
fi

echo "Building Hugo site..."
hugo --minify

echo "Converting Gemini content..."
./scripts/convert-gemini-content.sh

echo "Building Rust server..."
cd server

if [ "$TARGET" = "aarch64" ]; then
  echo "  Target: aarch64-unknown-linux-musl (cross-compile)"
  cargo build --release --target aarch64-unknown-linux-musl
  BINARY="target/aarch64-unknown-linux-musl/release/static-server"
else
  echo "  Target: native"
  cargo build --release
  BINARY="target/release/static-server"
fi

SIZE=$(du -h "$BINARY" | cut -f1)
echo ""
echo "Build complete! Binary: server/$BINARY ($SIZE)"
"""

[tasks.dev]
description = "Build and run server locally"
run = """
#!/usr/bin/env bash
set -e

# Build native for local dev
mise run build

cd server
echo "Starting server on http://localhost:8080 ..."
PORT=8080 DOMAIN=localhost ./target/release/static-server
"""

[tasks.lighthouse]
description = "Run Lighthouse (mobile + desktop) against a local hugo server"
run = "./scripts/lighthouse-audit.sh"

[tasks.deploy]
description = "Cross-compile for aarch64 and deploy to VPS via SSH"
run = """
#!/usr/bin/env bash
set -e

mise run build aarch64

cd server
CALLED_FROM_MISE=1 ./deploy-vps.sh
"""
