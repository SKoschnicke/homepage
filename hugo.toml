baseURL = 'https://sven.guru/'
languageCode = 'en-us'
title = 'Sven Koschnicke'
theme = 'wizard'

# Gemini output format
[mediaTypes."text/gemini"]
  suffixes = ["gmi"]

[outputFormats.gemini]
  baseName = "index"
  mediaType = "text/gemini"
  isPlainText = true
  notAlternative = true

[outputs]
  home = ["HTML", "RSS", "gemini"]
  page = ["HTML", "gemini"]
  section = ["HTML", "RSS", "gemini"]

# English at the root (/), German under /de/. Do NOT set
# defaultContentLanguageInSubdir, otherwise English would move to /en/.
defaultContentLanguage = 'en'

[languages]
  [languages.en]
    languageName = 'English'
    languageCode = 'en-us'
    title = 'Sven Koschnicke'
    weight = 1
    [languages.en.params]
      menu = [
          {Name = "About", URL = "/about/", HasChildren = false},
          {Name = "Posts", URL = "/posts/", HasChildren = false},
      ]
  [languages.de]
    languageName = 'Deutsch'
    languageCode = 'de-de'
    title = 'Sven Koschnicke'
    weight = 2
    contentDir = 'content/de'
    [languages.de.params]
      description = "Gedanken über Technik"
      menu = [
          {Name = "Über mich", URL = "/de/about/", HasChildren = false},
          {Name = "Beiträge", URL = "/de/posts/", HasChildren = false},
      ]

[markup.goldmark.renderer]
  unsafe = true

# Shared params merge into every language; per-language [languages.xx.params]
# above override these keys (menu, description).
[params]
    brand = "sven.guru"
    description = "Thoughts about tech"

    # Essential social links only
    email_url = "mailto:s.koschnicke@gfxpro.com"
    github_url = "https://github.com/SKoschnicke"
    linkedin_url = "https://www.linkedin.com/in/svenkoschnicke/"
    mastodon_url = "https://chaos.social/@darkunicorn"
    rss_icon = true
    rss_section = "posts"
