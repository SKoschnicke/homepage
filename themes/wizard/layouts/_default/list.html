{{ define "main" }}
    <section class="posts-list">
        {{ if and .Title (not .IsHome) }}
        <header class="section-header">
            <h1>{{ .Title }}</h1>
        </header>
        {{ end }}

        {{ range .Pages }}
        <article class="post-summary">
            <header>
                <h2 class="post-title">
                    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                </h2>
                {{ partial "post/meta.html" . }}
            </header>

            <div class="post-summary-text">
                {{ with .Description }}
                    <p>{{ . }}</p>
                {{ else }}
                    {{ .Summary }}
                {{ end }}
            </div>

            <footer class="post-footer">
                <a href="{{ .RelPermalink }}" class="read-more" aria-label="Read more about {{ .Title }}">Read more →</a>
            </footer>
        </article>
        {{ end }}
    </section>
{{ end }}
